{% extends "base.html" %}

{% block content %}
<h1>Manage Users</h1>

{% if users %}
    <div class="grid">
        {% for user in users %}
            <div class="card">
                <h2>{{ user.username }}</h2>
                <p><strong>Email:</strong> {{ user.email }}</p>
                <p><strong>Role:</strong> {{ user.role }}</p>

                <form method="POST" action="{{ url_for('admin_reset_user_password', user_id=user.id) }}">
                    <button type="submit" onclick="return confirm('Reset password for {{ user.username }}?')">
                        Reset Password
                    </button>
                </form>
            </div>
        {% endfor %}
    </div>
{% else %}
    <p>No users found.</p>
{% endif %}
{% endblock %}
