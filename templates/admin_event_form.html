{% extends "base.html" %}
{% block content %}
<h1>{{ "Edit Event" if event else "Create Event" }}</h1>

<form method="POST" class="form-box">
    <label>Organizer</label>
    <select name="organizer_id" required>
        {% for organizer in organizers %}
        <option value="{{ organizer.id }}" {% if event and event.organizer_id == organizer.id %}selected{% endif %}>
            {{ organizer.name }} ({{ organizer.organization_name or "No Organization" }})
        </option>
        {% endfor %}
    </select>

    <label>Title</label>
    <input type="text" name="title" value="{{ event.title if event else '' }}" required>

    <label>Description</label>
    <textarea name="description" required>{{ event.description if event else '' }}</textarea>

    <label>Category</label>
    <input type="text" name="category" value="{{ event.category if event else '' }}">

    <label>Location</label>
    <input type="text" name="location" value="{{ event.location if event else '' }}" required>

    <label>Date and Time</label>
    <input type="datetime-local" name="event_date" value="{{ event.event_date.strftime('%Y-%m-%dT%H:%M') if event else '' }}" required>

    <label>Ticket Price</label>
    <input type="number" step="0.01" name="ticket_price" value="{{ event.ticket_price if event else '' }}" required>

    <label>Available Tickets</label>
    <input type="number" name="available_tickets" value="{{ event.available_tickets if event else '' }}" required>

    <label for="image_url">Event Image URL</label>
    <input
        type="text"
        id="image_url"
        name="image_url"
        value="{{ event.image_url if event else '' }}"
        placeholder="Paste image URL"
    >

    <button type="submit">{{ "Update Event" if event else "Create Event" }}</button>
</form>
{% endblock %}
